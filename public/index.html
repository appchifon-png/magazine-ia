<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>magazine ia</title>

<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* Reset and Basic Styles */
body {
    margin: 0;
    background: linear-gradient(135deg, #050510 0%, #1a0a2a 100%); /* Darker gradient */
    color: #e0e0e0; /* Softer white */
    font-family: 'Poppins', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    text-align: center;
    overflow: hidden; /* Prevent scrollbar from gradient */
}

/* Card Styling */
.card {
    padding: 50px 30px;
    background: rgba(10, 10, 30, 0.7); /* Semi-transparent dark */
    border-radius: 24px;
    box-shadow: 0 0 40px rgba(0, 245, 255, 0.4), /* Outer glow */
                inset 0 0 20px rgba(0, 245, 255, 0.2); /* Inner glow */
    backdrop-filter: blur(8px); /* Subtle glass effect */
    -webkit-backdrop-filter: blur(8px); /* Safari compatibility */
    max-width: 500px;
    width: 90%; /* Responsive width */
    position: relative;
    overflow: hidden; /* Ensures inner elements don't spill out */
    border: 1px solid rgba(0, 245, 255, 0.3); /* Subtle border for definition */
}

/* Text Styling */
h1 {
    font-size: 2.8em;
    color: #00f5ff; /* Accent color */
    margin-bottom: 20px;
    text-shadow: 0 0 10px rgba(0, 245, 255, 0.5); /* Subtle text glow */
    font-weight: 600;
}

p {
    font-size: 1.1em;
    line-height: 1.6;
    margin-bottom: 30px;
    font-weight: 300;
}

/* Call to Action Button */
.cta-button {
    background: linear-gradient(45deg, #00f5ff, #007bff); /* Gradient button */
    border: none;
    border-radius: 50px;
    color: white;
    padding: 15px 35px;
    font-size: 1.1em;
    font-weight: 600;
    cursor: pointer;
    outline: none;
    box-shadow: 0 10px 20px rgba(0, 245, 255, 0.3);
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
}

.cta-button:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 30px rgba(0, 245, 255, 0.5);
    background: linear-gradient(45deg, #00d9e3, #0060c0); /* Slightly darker hover gradient */
}

/* Responsive adjustments */
@media (max-width: 600px) {
    .card {
        padding: 40px 20px;
    }
    h1 {
        font-size: 2.2em;
    }
    p {
        font-size: 1em;
    }
    .cta-button {
        padding: 12px 25px;
        font-size: 1em;
    }
}

</style>
</head>

<body>

<div class="card">

<h1>⚡ magazine ia</h1>

<p>Explora contenido innovador y artículos generados con la potencia del Forge GO Engine. Tu próxima fuente de inspiración está aquí.</p>

<button class="cta-button">Descubrir Ahora</button>

</div>

<script>
if("serviceWorker" in navigator){
navigator.serviceWorker.register("/service-worker.js").then(registration => {
    console.log("Service Worker registered with scope:", registration.scope);
}).catch(error => {
    console.error("Service Worker registration failed:", error);
});
}
</script>

</body>
</html>
